exclude = [
    "alembic",
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

line-length = 88
indent-width = 4
target-version = "py312"
src = ["app"]

[format]
preview = true
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = "dynamic"


[lint]
select = ["ALL"]
preview = true
ignore = [
    "missing-copyright-notice",
    "undocumented-public-package",
    "undocumented-public-module",
    "undocumented-public-class",
    "undocumented-public-init",
    "undocumented-public-method",
    "undocumented-public-function",
    "undocumented-magic-method",
    "docstring-missing-yields",
    "docstring-missing-returns",
    "docstring-extraneous-exception",
    "hardcoded-password-string",
    "unused-async",
    "fallible-context-manager", # Context manager does not catch exceptionsRuff
    "yield-in-context-manager-in-async-generator", # Yield in context manager in async generator may not trigger cleanup
    "any-type", # Dynamically typed expressions (typing.Any) are disallowed in `...`
    "no-self-use", # Method `...` could be a function, class method, or static method
]

[lint.isort]
known-first-party = ["app"]

[lint.per-file-ignores]
"{auth.py,chat.py}" = [
    "missing-return-type-undocumented-public-function",
    "unused-function-argument",
]
"config.py" = [
    "unused-class-method-argument",
]
"main.py" = [
    "import-private-name",
    "missing-return-type-undocumented-public-function",
]
"{test_*.py,conftest.py}" = [
    "assert",
]